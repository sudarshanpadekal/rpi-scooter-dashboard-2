<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scooter Dashboard</title>
  <link rel="stylesheet" href="style.css">
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
  <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
  <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
</head>

<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo">🛵</div>
      <div>
        <div class="title">Scooter Dashboard</div>
        <div class="subtitle">Live vehicle telemetry</div>
      </div>
    </div>

    <div class="status">
      <span class="dot dot--offline" id="connDot"></span>
      <span id="connText">Connecting…</span>
    </div>
  </header>

  <main class="container">
    <section class="left">
      <div class="mapWrap">
        <div id="map"></div>
      </div>
    </section>

    <section class="right">
      <div class="card">
        <div class="cardHead">
          <h2>Current Time</h2>
          <div class="meta" id="lastUpdated">—</div>
        </div>
        <h1 id="clock">00:00</h1>
      </div>

      <div class="card">
        <h2>Next Service</h2>
        <h3 id="service" class="muted">Not available</h3>
      </div>

      <div class="card">
        <div class="cardHead">
          <h2>Pothole Status</h2>
        </div>
        <h3 id="alert" class="badge badge--safe">SAFE</h3>
      </div>

      <div class="card">
        <h2>Documents</h2>
        <div class="docs">
          <a class="doc" href="/documents/rc.pdf">RC</a>
          <a class="doc" href="/documents/insurance.pdf">Insurance</a>
          <a class="doc" href="/documents/puc.pdf">PUC</a>
        </div>
      </div>
    </section>
  </main>

  <div id="docModal" class="modal">
    <div class="modal-content">
      <span class="close-btn">&times;</span>
      <iframe id="docFrame" src="" frameborder="0"></iframe>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
